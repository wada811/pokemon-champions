name: 月次情報収集 (Monthly Info Collection)

on:
  schedule:
    # 毎月1日 午前9時 (JST = UTC+9) に実行 → UTC 0:00
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      year_month:
        description: '対象年月 (例: 2025年05月)'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  create-collection-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Determine target month
        id: date
        run: |
          if [ -n "${{ github.event.inputs.year_month }}" ]; then
            echo "label=${{ github.event.inputs.year_month }}" >> "$GITHUB_OUTPUT"
          else
            echo "label=$(TZ=Asia/Tokyo date '+%Y年%m月')" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create monthly info collection issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const month = '${{ steps.date.outputs.label }}';
            const monthCode = month.replace('年', '-').replace('月', '');

            // Read and parse the issue template
            const templatePath = '.github/ISSUE_TEMPLATE/monthly-info-collection.md';
            const raw = fs.readFileSync(templatePath, 'utf8');

            // Strip YAML frontmatter (--- ... ---)
            const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
            if (!fmMatch) throw new Error('Could not parse issue template frontmatter');
            const frontmatter = fmMatch[1];
            let body = fmMatch[2].trim();

            // Extract title template from frontmatter and substitute month
            const titleLine = frontmatter.match(/^title:\s*['"]?(.*?)['"]?\s*$/m);
            if (!titleLine) throw new Error('Could not parse title from frontmatter');
            const title = titleLine[1].replace(/\{\{.*?\}\}/g, month);

            // Replace YYYY-MM placeholder with actual month code
            body = body.split('YYYY-MM').join(monthCode);

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['monthly-collection', 'copilot'],
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);
